        <title>Watermelon</title>

            <div id="keypoints" class="tabcontent">
                <iframe src="..//articles_content/watermelon/kpts.html" 
                title="Watermelon"
                id="keypoints_iframe"
                data-pagefind-body></iframe>
            </div>

            <div id="sources" class="tabcontent">
                <iframe src="..//articles_content/watermelon/sources.html" 
                title="Watermelon"
                id="sources_iframe"
                data-pagefind-body></iframe>
